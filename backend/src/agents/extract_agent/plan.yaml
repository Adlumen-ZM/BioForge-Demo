  # ── 基础步骤（当前启用）────────────────────────────────────────────────────
  - step_id: "llm_extract"
    name: "LLM 信息抽取"
    instruction: |
      根据输入的论文文本，调用 LLM 抽取结构化信息。

      输入数据（来自 pipeline_state）：
        - paper_texts: 论文文本内容列表

      抽取要求：
        1. 提取论文元数据：DOI、标题、作者、期刊、发表年份
        2. 识别并提取所有 FAE 肽段：
           - 肽段序列（氨基酸缩写，如 "AKKARA"）
           - 序列长度
           - 所在的蛋白质来源
           - 与矿物（HAp/磷酸钙）的相互作用描述
        3. 提取实验方法：合成方法、表征技术、生物活性测试等
        4. 提取结论：生物矿化机制、结论、创新点

      输出 JSON 格式：
      {
        "papers": [
          {
            "paper_id": "<paper_id>",
            "doi": "<doi 或 null>",
            "title": "<论文标题>",
            "authors": ["<作者1>", "<作者2>", ...],
            "journal": "<期刊名>",
            "year": <年份>,
            "fae_records": [
              {
                "sequence": "<肽段序列>",
                "length": <氨基酸数量>,
                "source_protein": "<来源蛋白质>",
                "mineral_type": "<矿物类型：HAp/磷酸钙/其他>",
                "interaction_description": "<相互作用描述>",
                "bioactivity": "<生物活性描述>"
              }
            ],
            "methods": ["<方法1>", "<方法2>", ...],
            "conclusions": "<主要结论>"
          }
        ],
        "extraction_stats": {
          "papers_processed": <int>,
          "papers_succeeded": <int>,
          "papers_failed": <int>
        }
      }

      重要：
        - 对于无法提取的字段，使用 null
        - reasoning 过程必须包含在输出中（reasoning 字段）
        - 严格遵循 JSON 格式，避免解析错误
    tools_required: []
    success_criteria:
      required_fields:
        - "papers"
      min_count:
        papers: 1
    max_retries: 2
    db_write_policy: "none"

  - step_id: "validate_output"
    name: "输出格式校验"
    instruction: |
      对上一步 LLM 抽取的输出进行格式和内容校验。

      校验规则：
        1. JSON 格式校验：确保可解析
        2. 必填字段校验：
           - papers 数组必须存在
           - 每篇论文必须有 title 和 fae_records
           - 每个 fae_record 必须有 sequence 和 interaction_description
        3. 语义合理性校验：
           - 序列必须是有效的氨基酸缩写（A-Z，仅 20 种标准氨基酸）
           - 年份必须在合理范围内（1990-当前年份）
        4. 数据完整性检查：
           - 统计成功/失败论文数
           - 识别抽取不完整的记录

      输出 JSON 格式：
      {
        "validation_result": "pass" | "partial" | "fail",
        "valid_papers": [<通过校验的论文索引列表>],
        "invalid_papers": [
          {
            "index": <int>,
            "errors": ["<错误1>", "<错误2>", ...]
          }
        ],
        "summary": "<校验总结>"
      }
    tools_required: []
    success_criteria:
      required_fields:
        - "validation_result"
        - "valid_papers"
      min_count: {}
    max_retries: 1
    db_write_policy: "none"