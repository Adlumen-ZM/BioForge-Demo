# extract_agent/plan.yaml
# ExtractAgent 的预定义 plan — RAG CSV 抽取工具调用器
# 不直接写数据库；五表 CSV 输出由 write_rag_csv_to_db_node 写入。

plan_id: "extract_plan_rag_csv_v1"
agent_name: "extract_agent"
version: "2.0"

steps:
  - step_id: "run_rag_csv_pipeline"
    name: "调用 RAG 端到端抽取工具"
    instruction: |
      调用 run_bio_paper_extraction_pipeline 工具执行完整抽取。

      输入（从 upstream_context 获取）：
        - pdf_path：PDF 文件绝对路径
        - output_dir：CSV 输出目录（格式：
            data/projects/{extraction_profile}/papers/{paper_key}/outputs/rag_csv）
        - template_id：固定传入 "hap_peptide_v1"
        - overwrite：默认 false

      如果 upstream_context 中没有 paper_key 或 extraction_profile，
      使用如下兜底构造：
        output_dir = data/projects/hap_peptide_v1/papers/unknown/outputs/rag_csv

      工具将自动完成：
        RAGFlow 视觉解析 → BGE-M3 混合检索 → LLM 字段抽取 →
        枚举归一化 → 五表 CSV 写出

      最终回答必须是严格的 JSON 格式：
      {
        "status": "ok" | "error",
        "output_dir": "<CSV 输出目录路径>",
        "csv_files": {
          "paper": "<path>",
          "paper_entity_record": "<path>",
          "entity_component": "<path>",
          "record_function": "<path>",
          "function_assay_evidence": "<path>"
        },
        "tables": {
          "paper": {"rows": <int>},
          "paper_entity_record": {"rows": <int>},
          "entity_component": {"rows": <int>},
          "record_function": {"rows": <int>},
          "function_assay_evidence": {"rows": <int>}
        },
        "error": "<错误信息或 null>"
      }
    tools_required:
      - "run_bio_paper_extraction_pipeline"
    success_criteria:
      required_fields:
        - "status"
        - "output_dir"
        - "csv_files"
      min_count: {}
    max_retries: 1
    db_write_policy: "none"

  - step_id: "check_csv_output"
    name: "检查 RAG CSV 输出完整性"
    instruction: |
      检查上一步 run_rag_csv_pipeline 的输出，确认五张 CSV 全部存在。

      检查项：
        1. status 是否为 "ok"
        2. csv_files 是否包含以下五张表的路径：
           paper、paper_entity_record、entity_component、
           record_function、function_assay_evidence
        3. 各表 rows 数量（为 0 不算失败，记录在摘要中）

      不写数据库，不修改 CSV。

      最终回答必须是严格的 JSON 格式：
      {
        "csv_files": <从上一步透传>,
        "tables_summary": {
          "paper": <rows>,
          "paper_entity_record": <rows>,
          "entity_component": <rows>,
          "record_function": <rows>,
          "function_assay_evidence": <rows>
        },
        "all_tables_present": true | false,
        "extract_summary": "<一句话摘要：几张表、共几行数据>"
      }
    tools_required: []
    success_criteria:
      required_fields:
        - "csv_files"
        - "extract_summary"
      min_count: {}
    max_retries: 1
    db_write_policy: "none"
