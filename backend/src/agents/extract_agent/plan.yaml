# extract_agent/plan.yaml
# ExtractAgent 的预定义 plan，多阶段抽取流程。
# plan_runner 按顺序执行，replanner 可在运行时修改内存中的 plan 对象（不回写此文件）。
#
# 注意：RAG 相关步骤（chunk_documents, embed_and_index, retrieve_context）已注释，
#       等待 FlagEmbedding 依赖安装后启用。当前使用基础模式（llm_extract + validate_output）。

plan_id: "extract_plan_v02"
agent_name: "extract_agent"
version: "1.0"

steps:
