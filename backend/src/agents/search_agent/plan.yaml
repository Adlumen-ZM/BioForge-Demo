# search_agent/plan.yaml
# SearchAgent 的预定义 plan — hap_peptide_v1 专用多轮检索流程。
# 输出 queries 数组 + candidates 完整元数据（含 title/abstract）。

plan_id: "search_plan_hap_v1"
agent_name: "search_agent"
version: "2.0"

steps:
  - step_id: "task_understanding"
    name: "任务理解"
    instruction: |
      深入理解研究目标，明确检索核心问题和边界。

      输入（来自 PipelineState 或用户输入）：
        - refined_task_prompt：Guide Agent 规范化后的任务描述
        - user_query / query：原始任务描述

      理解要点：
        1. 核心实体：识别肽段类型（HAp 结合肽、牙釉质矿化肽、骨矿化肽等）
        2. 关系类型：吸附 / 成核 / 抑制 / 促矿化 / 序列功能
        3. 实验体系：体外 / 体内 / 模拟矿化
        4. 边界：时间范围、语言（英文优先）

      输出 JSON 格式：
      {
        "understood_objective": "<对研究目标的理解>",
        "core_entities": ["HAp", "peptide", "..."],
        "relation_types": ["adsorption", "mineralization", "..."],
        "experimental_models": ["in vitro", "..."],
        "constraints": {"time_range": null, "language": "English"},
        "understanding_summary": "<一句话摘要>"
      }
    tools_required: []
    success_criteria:
      required_fields:
        - "understood_objective"
        - "core_entities"
      min_count: {}
    max_retries: 2
    db_write_policy: "none"

  - step_id: "query_build"
    name: "构建多条检索式"
    instruction: |
      根据任务理解，为 hap_peptide_v1 主题构建 3~5 条覆盖不同角度的 PubMed 检索式。

      必须包含的角度（参考 pubmed_query.md skill）：
        1. q1_precise   — 高精准：肽段 + HAp/磷酸钙 + 吸附/结合
        2. q2_recall    — 高召回：放宽同义词，增加矿化/生物矿化
        3. q3_sequence  — 序列设计：氨基酸序列 + 设计 / phage display
        4. q4_enamel    — 牙釉质/牙本质专项
        5. q5_broad     — 宽泛备用（可选，仅在前 4 条检索量不足时使用）

      每条检索式必须使用 PubMed 规范语法（MeSH / [tiab] 限定 / 布尔运算符大写）。

      输出 JSON 格式：
      {
        "queries": [
          {
            "query_id":     "q1_precise",
            "query_string": "(hydroxyapatite OR HAp) AND (peptide OR binding peptide) AND (adsorption OR binding) AND (sequence OR amino acid)",
            "purpose":      "high_precision",
            "rationale":    "<构建理由>"
          },
          {
            "query_id":     "q2_recall",
            "query_string": "...",
            "purpose":      "high_recall",
            "rationale":    "..."
          }
        ]
      }
    tools_required: []
    success_criteria:
      required_fields:
        - "queries"
      min_count:
        queries: 3
    max_retries: 2
    db_write_policy: "none"

  - step_id: "search_execute"
    name: "逐条执行 PubMed 检索并合并结果"
    instruction: |
      对上一步 query_build 输出的 queries 数组，逐条调用 pubmed_search 工具。

      执行规则：
        - 每条检索式 max_results = 100
        - 所有结果合并到同一列表
        - 同一 PMID 重复出现时保留第一次结果（后续去重步骤处理）
        - 若某条检索式失败（status != ok），记录错误并继续下一条

      合并后输出 JSON 格式：
      {
        "raw_candidates": [
          {
            "pmid":             "<PMID>",
            "doi":              "<DOI 或 null>",
            "title":            "<标题>",
            "abstract":         "<摘要>",
            "journal_title":    "<期刊名>",
            "publication_year": <年份或 null>,
            "authors":          ["<作者>"],
            "source":           "pubmed",
            "query_id":         "<来源检索式 ID>"
          }
        ],
        "search_stats": {
          "queries_executed": <int>,
          "queries_failed":   <int>,
          "raw_total":        <int>
        }
      }
    tools_required:
      - "pubmed_search"
    success_criteria:
      required_fields:
        - "raw_candidates"
        - "search_stats"
      min_count:
        raw_candidates: 1
    max_retries: 2
    db_write_policy: "none"

  - step_id: "dedup_filter"
    name: "去重与整理候选文献"
    instruction: |
      对 raw_candidates 按 PMID（优先）/ DOI / 标准化标题 进行去重，
      输出最终候选文献列表。

      去重规则：
        1. PMID 相同 → 保留第一次出现
        2. DOI 相同（忽略大小写）→ 保留第一次出现
        3. 标题前 80 字符相同（去空格、小写） → 保留第一次出现

      输出 JSON 格式：
      {
        "candidate_paper_ids": ["<PMID>", ...],
        "candidates": [
          {
            "pmid":             "<PMID>",
            "doi":              "<DOI 或 null>",
            "title":            "<标题>",
            "abstract":         "<摘要>",
            "journal_title":    "<期刊名>",
            "publication_year": <年份或 null>,
            "authors":          ["<作者>"],
            "source":           "pubmed"
          }
        ],
        "search_summary": "<一句话摘要：执行了几条检索式，初始 N 篇，去重后 M 篇>",
        "search_stats": {
          "queries_count":  <int>,
          "total_raw":      <int>,
          "after_dedup":    <int>
        }
      }
    tools_required: []
    success_criteria:
      required_fields:
        - "candidate_paper_ids"
        - "candidates"
        - "search_summary"
      min_count:
        candidate_paper_ids: 1
    max_retries: 1
    db_write_policy: "none"
