# _template/identity.yaml — 新 agent 身份配置骨架（复制后修改）
# context_builder 加载此文件并注入 executor 的 system prompt 头部。

agent_name: "my_agent"    # ← 修改，需与 plan.yaml 的 agent_name 和 agent.py 的 config.agent_name 一致

role: "替换为角色描述（如：生物医学文献筛选专家）"

objective: |
  替换为 agent 的核心目标（1-3 句话）。
  说明该 agent 在流水线中的定位和主要产出。

responsibilities:
  - "职责1：具体动作描述"
  - "职责2：具体动作描述"
  - "职责3：具体动作描述"

constraints:
  - "约束1：不做什么，或必须怎么做"
  - "约束2：输出格式要求或数量限制"

output_contract:
  # 定义 validate_plan 使用的输出契约，字段名需与 PlanStep.success_criteria 和
  # output_adapter._build_patch() 中的映射逻辑对应。
  field_a: "类型说明和数量要求"
  field_b: "格式说明"
