mapping_version: hap_peptide_v1
purpose: Map logical template fields to normalized business database write package / PostgreSQL physical tables.
notes:
- This file is a mapping contract, not executable SQL.
- record_function is represented as function_claim in the physical schema.
- function_assay_evidence is represented by evidence_observation + function_evidence_link + source_location + source_location_link.
- text_to_* fields are display fields derived from source_location records.
- Agent must output logical extraction_package; db_access mapping/writer handles physical persistence.
logical_to_physical:
  paper:
    paper:
    - title
    - journal_title
    - publication_year
    - abstract
    - full_text_availability
    - retrieval_source
    - curator_note
    paper_identifier:
    - doi
    - pmid
    paper_keyword:
    - keywords
  paper_entity_record:
    paper_entity_record:
    - entity_name_raw
    - entity_name_normalized
    - sequence_status
    - sequence_raw
    - sequence_normalized
    - is_sequence_backfilled
    - sequence_source_type
    - sequence_source_id
    - source_paper_id
    - sequence_source_location
    - text_to_sequence_source
    - entity_type
    - design_source_raw
    - design_source
    - entity_carrier_raw
    - entity_carrier_type
    - application_form
    - target_material_raw
    - target_material
    - target_substrate_raw
    - target_substrate
    - evidence_overall_level
    - model_system_summary
    - curator_note
    source_location:
    - seq_section_path
    - seq_subsection_label
    - seq_figure_ref
    - seq_table_ref
    - seq_page_no
    derived:
    - summary_functions
    - text_to_sequence
    - trace_status
  entity_component:
    entity_component:
    - component_order
    - component_type
    - component_name_raw
    - component_sequence
    - is_natural
    - modification_category
    - modification_detail
    - parent_protein_raw
    - parent_protein_accession
    - fragment_start
    - fragment_end
    - fragment_derivation_type
    - curator_note
  record_function:
    function_claim:
    - function_layer
    - function_label
    - function_source_raw
    - evidence_level
    - curator_note
    source_location:
    - func_section_path
    - func_subsection_label
    - func_figure_ref
    - func_table_ref
    - func_page_no
    derived:
    - text_to_function
    - trace_status
  function_assay_evidence:
    evidence_observation:
    - evidence_level
    - additive_system_raw
    - additive_system_type
    - delivery_mode
    - assay_category
    - validation_method_raw
    - validation_method
    - readout_main
    - result_text_summary
    - result_value_raw
    - result_value_normalized
    - curator_note
    function_evidence_link:
    - function_id
    - evidence_id
    source_location:
    - section_path
    - subsection_label
    - figure_ref
    - table_ref
    - page_no
    - quote_snippet
    - offset_start
    - offset_end
    - location_type
    derived:
    - text_to_evidence
    - trace_status
