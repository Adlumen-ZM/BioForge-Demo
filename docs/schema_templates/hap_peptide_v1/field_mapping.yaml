writer_expectation:
  input: logical extraction_package validated against schema.yaml / Pydantic schema
  entrypoint: save_extraction_package(conn, payload, run_id=None)
  requirements:
  - single transaction
  - idempotent upsert
  - business_object_registry registration
  - source_location linking
  - workflow_extraction_call audit
