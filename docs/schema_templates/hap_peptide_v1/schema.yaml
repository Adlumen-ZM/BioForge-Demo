  entity_component:
    description: 对象组成表；1 行 = 1 个对象中的 1 个组成模块。
    record_granularity: one row per component/module of an entity record
    primary_key: component_id
    foreign_keys:
      record_id: paper_entity_record.record_id
    id_rule: '{record_id}-C{nn}'
    fields:
      component_id:
        type: string
        required: true
        description: 模块记录编号。
        source: system
        participate_in_eval: false
        physical_mapping:
          table: entity_component
          column: component_id
      record_id:
        type: string
        required: true
        description: 所属对象记录编号。
        source: system
        participate_in_eval: false
        physical_mapping:
          table: entity_component
          column: record_id
      component_order:
        type: integer
        required: true
        description: 模块排列顺序。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: entity_component
          column: component_order
        rule_summary: 从 N 端到 C 端，从 1 递增。
      component_type:
        type: enum
        required: true
        description: 模块类型。
        source: agent
        participate_in_eval: true
        enum: component_type
        physical_mapping:
          table: entity_component
          column: component_type_id
      component_name_raw:
        type: string
        required: false
        description: 原文模块名称。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: entity_component
          column: component_name_raw
      component_sequence:
        type: string
        required: false
        description: 该模块氨基酸序列。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: entity_component
          column: component_sequence
      is_natural:
        type: boolean
        required: false
        description: 蛋白片段是否与天然母体序列一致。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: entity_component
          column: is_natural
        rule_summary: 仅 protein_fragment 通常填写 true/false；其他模块填 NULL。
        applicable_when: component_type == protein_fragment
      modification_category:
        type: enum
        required: false
        description: 修饰大类。
        source: agent
        participate_in_eval: true
        enum: modification_category
        physical_mapping:
          table: entity_component
          column: modification_category_id
      modification_detail:
        type: string
        required: false
        description: 修饰细节。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: entity_component
          column: modification_detail
        rule_summary: 格式 "{位点或范围}:{修饰子类型}:{简要描述}"，多个用分号分隔。
      parent_protein_raw:
        type: string
        required: false
        description: 母体蛋白原始名称。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: entity_component
          column: parent_protein_raw
        applicable_when: component_type == protein_fragment
      parent_protein_accession:
        type: string
        required: false
        description: 母体蛋白数据库登录号。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: entity_component
          column: parent_protein_accession
        applicable_when: component_type == protein_fragment
      fragment_start:
        type: integer
        required: false
        description: 片段在母体蛋白中起始残基。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: entity_component
          column: fragment_start
        applicable_when: component_type == protein_fragment
      fragment_end:
        type: integer
        required: false
        description: 片段在母体蛋白中结束残基。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: entity_component
          column: fragment_end
        applicable_when: component_type == protein_fragment
      fragment_derivation_type:
        type: enum
        required: false
        description: 片段来源区域。
        source: agent
        participate_in_eval: true
        enum: fragment_derivation_type
        physical_mapping:
          table: entity_component
          column: fragment_derivation_type_id
        rule_summary: 即使 is_natural=false，也应正常填写；来源区域不因是否突变而改变。
        applicable_when: component_type == protein_fragment
      curator_note:
        type: text
        required: false
        description: 人工备注。
        source: curator
        participate_in_eval: false
        physical_mapping:
          table: entity_component
          column: curator_note
cross_table_rules:
  summary_functions_derivation: paper_entity_record.summary_functions 由同一 record_id 下 record_function.function_label 去重聚合生成。
  evidence_overall_level_derivation: paper_entity_record.evidence_overall_level 由该对象所有 function/evidence 中最高证据层级推断。
  entity_type_derivation: entity_type 可由 entity_component 中功能类模块数量推断：1 个功能类为 single_peptide/protein_fragment/full_protein/modified_peptide；2
    个为 fusion_peptide；3 个及以上为 chimeric_peptide。
  function_layer_label_consistency:
    binding:
    - adsorption
    - localization
    - ion_capture
    kinetics:
    - nucleation
    - mineral_deposition
    - crystal_growth_promotion
    crystallography:
    - phase_stabilization
    - phase_transformation_promotion
    - crystal_growth_inhibition
    - crystal_orientation_modulation
    - crystal_morphology_modulation
    protection:
    - anti_demineralization
    biology:
    - antimicrobial
    - cell_adhesion_promotion
    other:
    - other
  source_location_display_generation: text_to_sequence/text_to_function/text_to_evidence 由 section_path、subsection_label、figure_ref、table_ref
    等结构化位置字段生成，多来源用分号分隔。
  no_direct_business_table_write: Agent 和 RAG 工具不得直接写 paper_entity_record/function_claim/evidence_observation 等物理表；必须由 save_extraction_package
    统一处理。
recommended_agent_io:
  input_context:
  - extraction_contract
  - filling_rules_summary
  - db_context
  - rag_parse_id
  - available_tools
  output_package:
    paper: paper object
    paper_entity_records: list of entity records; each may contain entity_components and record_functions
    record_functions: list of function claims or nested in each entity
    function_assay_evidences: list of evidence observations or nested in each function
