schema_version: hap_peptide_v1
template:
  template_id: hap_peptide_v1
  name: HAp interaction peptide extraction template
  domain: biomineralization_peptide
  status: draft_freeze_candidate
  created_for: Fudan-BioForge
  description: 用于 HAp 相互作用肽段文献结构化抽取的逻辑字段模板。采用 paper → paper_entity_record → record_function → function_assay_evidence 四层主链，并新增
    entity_component 支持复杂对象表达。
design_principles:
- 逻辑字段模板面向 Agent、人工标注和评估，不等同于 PostgreSQL 物理表。
- 物理业务库可采用更规范化的 schema；本模板通过 physical_mapping 与物理库连接。
- 所有枚举字段必须优先从 enum_groups 中选择；无法覆盖时使用 other/unclear 并在 curator_note 中说明。
- Agent 不直接写物理业务表；输出 extraction_package 后由 db_access/business 写入服务执行幂等持久化。
- source evidence 优先保留结构化字段；text_to_* 为人读聚合展示字段。
