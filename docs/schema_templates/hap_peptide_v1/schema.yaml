logical_tables:
  paper:
    description: 论文主表；1 行 = 1 篇论文，存储论文元数据并作为外层索引。
    record_granularity: one row per paper
    primary_key: paper_id
    id_rule: Pnnnnnn，例如 P000001
    fields:
      paper_id:
        type: string
        required: true
        description: 论文在系统内唯一编号。
        source: system
        participate_in_eval: false
        physical_mapping:
          table: paper
          column: paper_id
        rule_summary: 系统生成，格式 Pnnnnnn，作为其他逻辑表外键。
      doi:
        type: string
        required: true
        description: 论文 DOI。
        source: metadata_or_agent
        participate_in_eval: true
        physical_mapping:
          table: paper_identifier
          column: identifier_value
          condition:
            identifier_type: doi
        rule_summary: 从 PubMed/CrossRef/原文提取；录入前去重；无 DOI 时由人工处理。
      pmid:
        type: string
        required: false
        description: PubMed ID。
        source: metadata_or_agent
        participate_in_eval: true
        physical_mapping:
          table: paper_identifier
          column: identifier_value
          condition:
            identifier_type: pmid
        rule_summary: 仅 PubMed 收录论文填写。
      title:
        type: string
        required: true
        description: 论文完整标题。
        source: metadata_or_agent
        participate_in_eval: true
        physical_mapping:
          table: paper
          column: title
        rule_summary: 保留原始大小写和标点。
      journal_title:
        type: string
        required: true
        description: 期刊标题。
        source: metadata_or_agent
        participate_in_eval: true
        physical_mapping:
          table: paper
          column: journal_title
        rule_summary: 优先 PubMed 标准刊名/缩写；不确定时原文刊名。
      publication_year:
        type: integer
        required: true
        description: 出版年份。
        source: metadata_or_agent
        participate_in_eval: true
        physical_mapping:
          table: paper
          column: publication_year
        rule_summary: 四位数字；在线预出版按预出版年份并备注。
      abstract:
        type: text
        required: false
        description: 摘要全文。
        source: metadata_or_agent
        participate_in_eval: true
        physical_mapping:
          table: paper
          column: abstract
        rule_summary: 去除控制字符；结构化摘要可保留段落标记。
      keywords:
        type: list[string]
        required: false
        description: 作者关键词。
        source: metadata_or_agent
        participate_in_eval: true
        physical_mapping:
          table: paper_keyword
          column: keyword
        rule_summary: 可在 v1 作为逻辑字段；物理库可通过扩展表或 JSON 存储。
      full_text_availability:
        type: enum
        required: true
        description: 全文可获取状态。
        source: metadata_or_agent
        participate_in_eval: true
        enum: full_text_availability
        default: unknown
        physical_mapping:
          table: paper
          column: full_text_availability_id
        rule_summary: open_access/subscription/preprint/unknown。
      retrieval_source:
        type: enum
        required: true
        description: 元数据来源。
        source: system_or_agent
        participate_in_eval: true
        enum: retrieval_source
        physical_mapping:
          table: paper
          column: retrieval_source_id
        rule_summary: 记录 PubMed/CrossRef/manual/agent crawl 来源。
      curator_note:
        type: text
        required: false
        description: 人工备注。
        source: curator
        participate_in_eval: false
        physical_mapping:
          table: paper
          column: curator_note
  paper_entity_record:
    description: 论文对象记录表；1 行 = 1 篇论文中的 1 个肽段/对象。
    record_granularity: one row per peptide/object within a paper
    primary_key: record_id
    foreign_keys:
      paper_id: paper.paper_id
      source_paper_id: paper.paper_id
    id_rule: '{paper_id}-R{nn}，例如 P000001-R01'
    fields:
      record_id:
        type: string
        required: true
        description: 对象记录编号。
        source: system
        participate_in_eval: false
        physical_mapping:
          table: paper_entity_record
          column: record_id
      paper_id:
        type: string
        required: true
        description: 所属论文编号。
        source: system
        participate_in_eval: false
        physical_mapping:
          table: paper_entity_record
          column: paper_id
      entity_name_raw:
        type: string
        required: true
        description: 原文中的肽段/对象名称。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: paper_entity_record
          column: entity_name_raw
      entity_name_normalized:
        type: string
        required: true
        description: 标准化肽段/对象名称。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: paper_entity_record
          column: entity_name_normalized
        rule_summary: 优先使用序列本身；无序列时使用统一代号。
      sequence_status:
        type: enum
        required: true
        description: 序列提供状态。
        source: agent
        participate_in_eval: true
        enum: sequence_status
        default: not_reported
        physical_mapping:
          table: paper_entity_record
          column: sequence_status_id
      sequence_raw:
        type: string
        required: false
        description: 原文或回补获得的序列字符串。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: paper_entity_record
          column: sequence_raw
      sequence_normalized:
        type: string
        required: false
        description: 标准化序列。
        source: system_or_agent
        participate_in_eval: true
        physical_mapping:
          table: paper_entity_record
          column: sequence_normalized
        rule_summary: 去除空格、特殊字符、修饰符号，仅保留大写单字母氨基酸代码。
      is_sequence_backfilled:
        type: boolean
        required: true
        description: 序列是否由回补获得。
        source: agent
        participate_in_eval: true
        default: false
        physical_mapping:
          table: paper_entity_record
          column: is_sequence_backfilled
      sequence_source_type:
        type: enum
        required: false
        description: 序列回补来源类型。
        source: agent
        participate_in_eval: true
        enum: sequence_source_type
        physical_mapping:
          table: paper_entity_record
          column: sequence_source_type_id
      sequence_source_id:
        type: string
        required: false
        description: 序列回补来源标识。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: paper_entity_record
          column: sequence_source_id
      source_paper_id:
        type: string
        required: false
        description: 序列来自已收录参考文献时的来源论文 ID。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: paper_entity_record
          column: source_paper_id
      sequence_source_location:
        type: json
        required: false
        description: 序列在未入库来源中的位置线索。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: paper_entity_record
          column: sequence_source_location
      text_to_sequence_source:
        type: string
        required: false
        description: 序列回补来源的人读聚合字段。
        source: system_or_agent
        participate_in_eval: true
        physical_mapping:
          table: paper_entity_record
          column: text_to_sequence_source
      entity_type:
        type: enum
        required: false
        description: 对象结构类型。
        source: agent
        participate_in_eval: true
        enum: entity_type
        default: single_peptide
        physical_mapping:
          table: paper_entity_record
          column: entity_type_id
        rule_summary: 可由 entity_component 中功能类模块数量推断。
      design_source_raw:
        type: string
        required: false
        description: 原文关于来源/设计方式的描述。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: paper_entity_record
          column: design_source_raw
      design_source:
        type: enum
        required: false
        description: 标准化设计来源。
        source: agent
        participate_in_eval: true
        enum: design_source
        default: unclear
        physical_mapping:
          table: paper_entity_record
          column: design_source_id
      entity_carrier_raw:
        type: string
        required: false
        description: 对象整体包含载体/基质时的原文描述。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: paper_entity_record
          column: entity_carrier_raw
      entity_carrier_type:
        type: enum
        required: false
        description: 对象整体载体体系分类。
        source: agent
        participate_in_eval: true
        enum: entity_carrier_type
        default: unclear
        physical_mapping:
          table: paper_entity_record
          column: entity_carrier_type_id
      application_form:
        type: enum
        required: false
        description: 肽段在当前文献中的宏观使用方式。
        source: agent
        participate_in_eval: true
        enum: application_form
        default: unclear
        physical_mapping:
          table: paper_entity_record
          column: application_form_id
      target_material_raw:
        type: string
        required: false
        description: 主要作用材料原文描述。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: paper_entity_record
          column: target_material_raw
      target_material:
        type: enum
        required: false
        description: 主要作用材料。
        source: agent
        participate_in_eval: true
        enum: target_material
        default: unclear
        physical_mapping:
          table: paper_entity_record
          column: target_material_id
      target_substrate_raw:
        type: string
        required: false
        description: 作用基底/界面原文描述。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: paper_entity_record
          column: target_substrate_raw
      target_substrate:
        type: enum
        required: false
        description: 主要作用基底。
        source: agent
        participate_in_eval: true
        enum: target_substrate
        default: unclear
        physical_mapping:
          table: paper_entity_record
          column: target_substrate_id
      summary_functions:
        type: list[enum]
        required: true
        description: 核心功能标签集合。
        source: derived
        participate_in_eval: true
        enum: function_label
        physical_mapping:
          table: derived
          column: from_record_function.function_label
        rule_summary: 由 record_function.function_label 去重聚合生成；不是最终事实来源。
      evidence_overall_level:
        type: enum
        required: true
        description: 对象整体最高证据层级。
        source: agent
        participate_in_eval: true
        enum: evidence_level
        default: unclear
        physical_mapping:
          table: paper_entity_record
          column: evidence_overall_level_id
      model_system_summary:
        type: string
        required: false
        description: 实验模型体系简述。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: paper_entity_record
          column: model_system_summary
      seq_section_path:
        type: enum
        required: false
        description: 序列信息章节。
        source: agent
        participate_in_eval: true
        enum: section_path
        physical_mapping:
          table: source_location
          column: section_path_id
          role: sequence
      seq_subsection_label:
        type: string
        required: false
        description: 序列信息小节。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: source_location
          column: subsection_label
          role: sequence
      seq_figure_ref:
        type: string
        required: false
        description: 序列信息图编号。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: source_location
          column: figure_ref
          role: sequence
      seq_table_ref:
        type: string
        required: false
        description: 序列信息表编号。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: source_location
          column: table_ref
          role: sequence
      seq_page_no:
        type: integer
        required: false
        description: 序列信息页码。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: source_location
          column: page_no
          role: sequence
      text_to_sequence:
        type: string
        required: false
        description: 序列来源的人读聚合展示。
        source: system_or_agent
        participate_in_eval: true
        physical_mapping:
          table: derived
          column: source_location.display_text
          role: sequence
      trace_status:
        type: enum
        required: true
        description: 对象记录溯源完整度。
        source: agent
        participate_in_eval: true
        enum: trace_status
        default: missing
        physical_mapping:
          table: source_location_link
          column: link_status
      curator_note:
        type: text
        required: false
        description: 人工备注。
        source: curator
        participate_in_eval: false
        physical_mapping:
          table: paper_entity_record
          column: curator_note
  record_function:
    description: 功能结论表；1 行 = 1 个肽段对象的一种功能结论。
    record_granularity: one row per function claim of an entity record
    primary_key: function_id
    foreign_keys:
      record_id: paper_entity_record.record_id
    id_rule: '{record_id}-F{nn}'
    physical_table: function_claim
    fields:
      function_id:
        type: string
        required: true
        description: 功能记录编号。
        source: system
        participate_in_eval: false
        physical_mapping:
          table: function_claim
          column: function_claim_id
      record_id:
        type: string
        required: true
        description: 所属对象记录编号。
        source: system
        participate_in_eval: false
        physical_mapping:
          table: function_claim
          column: record_id
      function_layer:
        type: enum
        required: true
        description: 功能宏观层级。
        source: agent
        participate_in_eval: true
        enum: function_layer
        physical_mapping:
          table: function_claim
          column: function_layer_id
      function_label:
        type: enum
        required: true
        description: 具体功能标签。
        source: agent
        participate_in_eval: true
        enum: function_label
        physical_mapping:
          table: function_claim
          column: function_label_id
      function_source_raw:
        type: string
        required: false
        description: 原文功能描述。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: function_claim
          column: function_source_raw
      evidence_level:
        type: enum
        required: true
        description: 支撑该功能的最高证据层级。
        source: agent
        participate_in_eval: true
        enum: evidence_level
        default: unclear
        physical_mapping:
          table: function_claim
          column: evidence_level_id
      func_section_path:
        type: enum
        required: false
        description: 功能结论章节。
        source: agent
        participate_in_eval: true
        enum: section_path
        physical_mapping:
          table: source_location
          column: section_path_id
          role: function
      func_subsection_label:
        type: string
        required: false
        description: 功能结论小节。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: source_location
          column: subsection_label
          role: function
      func_figure_ref:
        type: string
        required: false
        description: 功能结论图编号。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: source_location
          column: figure_ref
          role: function
      func_table_ref:
        type: string
        required: false
        description: 功能结论表编号。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: source_location
          column: table_ref
          role: function
      func_page_no:
        type: integer
        required: false
        description: 功能结论页码。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: source_location
          column: page_no
          role: function
      text_to_function:
        type: string
        required: false
        description: 功能结论人读溯源。
        source: system_or_agent
        participate_in_eval: true
        physical_mapping:
          table: derived
          column: source_location.display_text
          role: function
      trace_status:
        type: enum
        required: true
        description: 功能记录溯源完整度。
        source: agent
        participate_in_eval: true
        enum: trace_status
        default: missing
        physical_mapping:
          table: source_location_link
          column: link_status
      curator_note:
        type: text
        required: false
        description: 人工备注。
        source: curator
        participate_in_eval: false
        physical_mapping:
          table: function_claim
          column: curator_note
  function_assay_evidence:
    description: 功能证据表；1 行 = 1 个功能结论对应的 1 种实验方法 + 1 组结果。
    record_granularity: one row per function-method-result evidence observation
    primary_key: evidence_id
    foreign_keys:
      function_id: record_function.function_id
    id_rule: '{function_id}-E{nn}'
    physical_tables:
    - evidence_observation
    - function_evidence_link
    - source_location
    - source_location_link
    fields:
      evidence_id:
        type: string
        required: true
        description: 证据记录编号。
        source: system
        participate_in_eval: false
        physical_mapping:
          table: evidence_observation
          column: evidence_id
      function_id:
        type: string
        required: true
        description: 关联功能记录编号。
        source: system
        participate_in_eval: false
        physical_mapping:
          table: function_evidence_link
          column: function_claim_id
      evidence_level:
        type: enum
        required: true
        description: 本条证据层级。
        source: agent
        participate_in_eval: true
        enum: evidence_level
        default: unclear
        physical_mapping:
          table: evidence_observation
          column: evidence_level_id
      additive_system_raw:
        type: string
        required: false
        description: 该证据实验载体/添加体系原文描述。
        source: agent
        participate_in_eval: true
        physical_mapping:
          table: evidence_observation
          column: additive_system_raw
      additive_system_type:
        type: enum
        required: false
