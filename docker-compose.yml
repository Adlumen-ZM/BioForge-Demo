version: "3.8"

services:
  pepclaw:
    image: ${DOCKER_IMAGE}:${DOCKER_TAG}
    container_name: pepclaw-container

    volumes:
      - ./.env:/app/.env
      - ./v0_1PDF:/app/v0_1PDF
      - ./data:/app/data
      - ./v0_1results:/app/v0_1results

    environment:
      - PYTHONUNBUFFERED=1
      - BIZ_DB_PATH=/app/data/hap_v01.db
      - TRACE_DB_PATH=/app/data/hap_trace.db

    working_dir: /app
    restart: "no"
    command: python run_batch.py
