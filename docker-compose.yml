version: "3.8"

services:
  pepclaw:
    image: ${DOCKER_IMAGE}:${DOCKER_TAG}
    container_name: pepclaw-container

    volumes:
      - ./.env:/app/.env
      - ./v0_1PDF:/app/v0_1PDF
      - ./data:/app/data
      - ./v0_1results:/app/v0_1results

    environment:
      - PYTHONUNBUFFERED=1
      - DATA_ROOT=/app/data
      - EXTRACTION_PROFILE=hap_peptide_v1
      - BIZ_DB_PATH=/app/data/projects/hap_peptide_v1/db/business.sqlite
      - TRACE_DB_PATH=/app/data/hap_trace.db
      - GRAPH_AGENT_MODE=demo

    working_dir: /app
    restart: "no"

    # ── 交互式支持（用于 CLI 对话） ──────────────────────────────────────────
    # 启用标准输入（stdin_open）和伪终端（tty），支持交互式 CLI 输入
    stdin_open: true
    tty: true

    # 默认不指定 command，容器启动后进入 shell
    # 用户可通过以下方式覆盖：
    #   docker-compose run pepclaw python -m backend.src.cli
    #   docker-compose exec pepclaw python -m backend.src.cli --check-only
