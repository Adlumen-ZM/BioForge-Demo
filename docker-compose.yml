version: "3.8"

services:
  bioforge:
    image: ${DOCKER_IMAGE}:${DOCKER_TAG}
    container_name: bioforge-container

    volumes:
      - ./.env:/app/.env
      - ./v0_1PDF:/app/v0_1PDF
      - ./data:/app/data
      - ./v0_1results:/app/v0_1results

    environment:
      - PYTHONUNBUFFERED=1
      - DATA_ROOT=/app/data
      - EXTRACTION_PROFILE=hap_peptide_v1
      - BIZ_DB_PATH=/app/data/projects/hap_peptide_v1/db/business.sqlite
      - TRACE_DB_PATH=/app/data/hap_trace.db
      - GRAPH_AGENT_MODE=demo

    working_dir: /app
    restart: "no"
    stdin_open: true
    tty: true

    # Interactive support for CLI input.
    # Override the default shell command when needed:
    # docker compose run --rm bioforge python -m backend.src.cli
    # docker compose run --rm bioforge python -m backend.src.cli --check-only
