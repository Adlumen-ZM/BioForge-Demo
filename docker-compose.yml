services:
  bioforge:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}
        PYTORCH_VERSION: ${PYTORCH_VERSION:-2.12.0}
    image: ${DOCKER_IMAGE}:${DOCKER_TAG}
    container_name: bioforge-container

    volumes:
      - ./.env:/app/.env
      - ./v0_1PDF:/app/v0_1PDF
      - ./data:/app/data
      - ./v0_1results:/app/v0_1results

    environment:
      - PYTHONUNBUFFERED=1
      - DATA_ROOT=/app/data
      - EXTRACTION_PROFILE=hap_peptide_v1
      - BIZ_DB_PATH=/app/data/projects/hap_peptide_v1/db/business.sqlite
      - TRACE_DB_PATH=/app/data/hap_trace.db
      - GRAPH_AGENT_MODE=demo
      - HF_HOME=/hf_cache
      - HUGGINGFACE_HUB_CACHE=/hf_cache/hub
      - TRANSFORMERS_CACHE=/hf_cache/hub
      - BGE_MODEL_DIR=BAAI/bge-m3
      - BGE_USE_FP16=false
      - RAGFLOW_CHUNK_METHOD=${RAGFLOW_CHUNK_METHOD:-paper}
      - RAGFLOW_POLL_TIMEOUT_SEC=${RAGFLOW_POLL_TIMEOUT_SEC:-600}
      - RAG_USE_CHROMADB=${RAG_USE_CHROMADB:-false}
      - RAG_MAX_ENTITIES_PER_PAPER=${RAG_MAX_ENTITIES_PER_PAPER:-3}
      - LLM_TIMEOUT_SEC=${LLM_TIMEOUT_SEC:-120}

    working_dir: /app
    restart: "no"
    stdin_open: true
    tty: true

    # Interactive support for CLI input.
    # Override the default shell command when needed:
    # docker compose run --rm bioforge python -m backend.src.cli
    # docker compose run --rm bioforge python -m backend.src.cli --check-only
