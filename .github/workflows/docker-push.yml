name: Docker Environment Image

# 触发条件：
# 只有当有人向 main 分支发起 PR，并且 Docker 环境相关文件发生变化时，才触发这个 workflow。
# 这符合我们当前策略：
#   - 普通业务代码改动不触发 Docker 镜像构建；
#   - 只有 Dockerfile / requirements / compose 等环境文件变化时才检查和构建；
#   - 当前阶段镜像定位是 environment image，不是 application image。
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - ".dockerignore"
      - "requirements.txt"
      - "scripts/docker_notion_precheck.py"
      - "scripts/docker_notion_writeback.py"
      - ".github/workflows/docker-push.yml"

# 并发控制：
# 同一个 PR 如果连续 push 多次，只保留最新一次运行。
# 旧的 workflow run 会被自动取消，避免多个 Docker 构建同时跑。
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# GitHub Actions token 权限：
# contents: read         读取仓库代码
# issues: write         在 PR conversation 里写普通 comment
# pull-requests: write  允许对 PR 相关资源进行写操作
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # ============================================================
  # Job 1: Notion precheck
  #
  # 作用：
  #   1. 从 Notion 页面读取 Docker 环境版本备案；
  #   2. 找到对应版本块；
  #   3. 解析其中的 JSON contract；
  #   4. 对比本地 Dockerfile / docker-compose.yml / requirements.txt；
  #   5. 检查 Docker Hub 中是否已经存在 image:tag；
  #   6. 生成 PR comment；
  #   7. 如果检查失败，则阻止后续 Docker build/push。
  # ============================================================
  notion_precheck:
    name: Notion Docker precheck
    runs-on: ubuntu-latest

    # 这些 outputs 会传给后面的 docker_build_push job。
    # docker_build_push 不再自己决定版本号，而是完全使用 Notion precheck 的输出。
    outputs:
      passed: ${{ steps.precheck.outputs.passed }}
      should_build: ${{ steps.precheck.outputs.should_build }}
      tag_exists: ${{ steps.precheck.outputs.tag_exists }}
      version: ${{ steps.precheck.outputs.version }}
      image: ${{ steps.precheck.outputs.image }}
      tag: ${{ steps.precheck.outputs.tag }}
      full_image: ${{ steps.precheck.outputs.full_image }}
      docker_config_hash: ${{ steps.precheck.outputs.docker_config_hash }}

    steps:
      # 安全保护：
      # 这个 workflow 会用到 Notion API key 和 Docker Hub token。
      # fork PR 默认拿不到 secrets，而且不应该允许外部 fork PR 推送公共 Docker 镜像。
      # 因此只允许同仓库分支发起的 PR 执行。
      - name: Reject fork PR for Docker publishing
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "Docker environment image publishing requires a same-repository PR."
          echo "Fork PRs do not receive the required Notion and Docker Hub secrets."
          exit 1

      # 拉取 PR 当前代码。
      - name: Checkout repository
        uses: actions/checkout@v4

      # 设置 Python 环境，用于运行 docker_notion_precheck.py。
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 安装 precheck 脚本依赖。
      # 当前脚本只依赖 requests。
      - name: Install Notion precheck dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 执行 Notion precheck。
      #
      # 输入：
      #   NOTION_API_KEY             GitHub secret，Notion integration token
      #   NOTION_DOCKER_PAGE_ID      GitHub secret，Docker 备案页面 ID
      #   DOCKER_ENV_VERSION         可选变量，指定读取 Notion 中哪个版本块
      #   DOCKERHUB_USERNAME         这里从你的 secret DOCKER_USERNAME 读取
      #   DOCKERHUB_TOKEN            Docker Hub token
      #
      # 输出文件：
      #   .docker_review/precheck.json
      #   .docker_review/docker.env
      #   .docker_review/comment.md
      #
      # GitHub outputs：
      #   passed / should_build / image / tag / full_image 等
      - name: Run Notion Docker precheck
        id: precheck
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DOCKER_PAGE_ID: ${{ secrets.NOTION_DOCKER_PAGE_ID }}

          # 可选。通常可以为空。
          # 如果你在 GitHub Repository Variables 里设置 DOCKER_ENV_VERSION，
          # precheck 会强制读取 Notion 中对应版本块。
          DOCKER_ENV_VERSION: ${{ vars.DOCKER_ENV_VERSION }}

          # precheck 脚本内部读取的环境变量名是 DOCKERHUB_USERNAME。
          # 但你 GitHub secret 里现在叫 DOCKER_USERNAME，所以这里做一次映射。
          DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

          # Notion API version。
          NOTION_VERSION: "2022-06-28"
        run: |
          mkdir -p .docker_review
          python scripts/docker_notion_precheck.py

      # 把 precheck 结果写到 PR comment。
      #
      # 这里用 marker 识别旧 comment：
      #   <!-- bioforge-docker-contract-precheck -->
      #
      # 如果之前已经发过 comment，就更新旧 comment；
      # 如果没有，就新建一条。
      #
      # continue-on-error: true 的原因：
      #   如果 GitHub 权限不足导致 comment 失败，不应该影响 precheck 产物上传。
      - name: Upsert PR Docker precheck comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require("fs");

            const marker = "<!-- bioforge-docker-contract-precheck -->";
            const commentPath = ".docker_review/comment.md";
            const body = fs.readFileSync(commentPath, "utf8");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => {
              return comment.body && comment.body.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      # 上传 precheck 产物，方便之后下载排查。
      #
      # 包括：
      #   .docker_review/precheck.json
      #   .docker_review/docker.env
      #   .docker_review/comment.md
      - name: Upload Docker precheck artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-precheck-artifacts-${{ github.run_number }}-${{ github.run_attempt }}
          path: .docker_review/

      # 如果 precheck 不通过，则这里主动 fail。
      #
      # 注意：
      #   这里和我们之前 Ruff CI 不一样。
      #   Docker precheck 是发布前强约束，不通过就不能构建镜像，也应该阻止 merge。
      #
      # 但在 fail 前，前面已经尽力发过 PR comment，也上传了 artifact。
      - name: Fail if Notion Docker precheck failed
        if: steps.precheck.outputs.passed != 'true'
        run: |
          echo "Notion Docker precheck failed."
          echo ""
          echo "===== Docker precheck summary ====="
          cat .docker_review/comment.md
          echo ""
          exit 1

  # ============================================================
  # Job 2: Docker build / push
  #
  # 作用：
  #   1. 接收 Notion precheck 的 image/tag/full_image；
  #   2. 如果 Docker Hub 已经存在该 tag，则跳过构建；
  #   3. 如果 tag 不存在，则 build 并 push 到 Docker Hub；
  #   4. 生成 build_result.json，供 Notion writeback 使用。
  #
  # 这部分中间的 Docker 构建块是 MS 后续主要维护区域。
  # ============================================================
  docker_build_push:
    name: Build and push Docker environment image
    runs-on: ubuntu-latest
    needs: notion_precheck

    # 只有 precheck 通过，并且 PR 来自同仓库分支，才进入 Docker build/push job。
    if: >
      needs.notion_precheck.outputs.passed == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository

    outputs:
      pushed: ${{ steps.write_success_result.outputs.pushed }}
      skipped: ${{ steps.write_skip_result.outputs.skipped }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      # 拉取当前 PR 代码。
      - name: Checkout repository
        uses: actions/checkout@v4

      # 下载 precheck job 生成的 .docker_review 文件。
      # 后面 writeback 需要 precheck.json。
      - name: Download Docker precheck artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-precheck-artifacts-${{ github.run_number }}-${{ github.run_attempt }}
          path: .docker_review/

      # 如果 should_build != true，说明不需要构建。
      #
      # 最常见原因：
      #   Docker Hub 上已经存在 Notion 中指定的 image:tag。
      #
      # 这种情况不报错，只写 build_result.json：
      #   pushed=false
      #   skipped=true
      - name: Write skipped build result when Docker Hub tag already exists
        id: write_skip_result
        if: needs.notion_precheck.outputs.should_build != 'true'
        env:
          VERSION: ${{ needs.notion_precheck.outputs.version }}
          IMAGE: ${{ needs.notion_precheck.outputs.image }}
          TAG: ${{ needs.notion_precheck.outputs.tag }}
          FULL_IMAGE: ${{ needs.notion_precheck.outputs.full_image }}
          DOCKER_CONFIG_HASH: ${{ needs.notion_precheck.outputs.docker_config_hash }}
        run: |
          mkdir -p .docker_review
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          result = {
              "pushed": False,
              "skipped": True,
              "build_failed": False,
              "reason": "Docker Hub tag already exists or precheck indicated no build is required.",
              "version": os.environ["VERSION"],
              "image": os.environ["IMAGE"],
              "tag": os.environ["TAG"],
              "full_image": os.environ["FULL_IMAGE"],
              "digest": "",
              "docker_config_hash": os.environ["DOCKER_CONFIG_HASH"],
              "sha": os.environ.get("GITHUB_SHA", ""),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_number": os.environ.get("GITHUB_RUN_NUMBER", ""),
              "run_url": f"{os.environ.get('GITHUB_SERVER_URL', 'https://github.com')}/{os.environ.get('GITHUB_REPOSITORY', '')}/actions/runs/{os.environ.get('GITHUB_RUN_ID', '')}",
          }

          Path(".docker_review/build_result.json").write_text(
              json.dumps(result, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          PY

          echo "skipped=true" >> "$GITHUB_OUTPUT"

      # ======================================================================
      # MS-owned block: Docker Buildx / Docker Hub login / build and push
      #
      # 这一块是 MS 后续主要维护的 Docker 构建区域。
      #
      # 可以按需要修改：
      #   - context: Docker build context
      #   - file: Dockerfile 路径
      #   - platforms: 是否构建多平台镜像，例如 linux/amd64,linux/arm64
      #   - cache-from / cache-to: Docker build cache 策略
      #   - labels: OCI image metadata
      #   - build-args: Docker build 参数
      #
      # 但建议不要改：
      #   - tags: ${{ needs.notion_precheck.outputs.full_image }}
      #
      # 因为 image/tag 应该统一来自 Notion precheck。
      # ======================================================================

      # 初始化 Docker Buildx。
      # Buildx 是 Docker 官方推荐的高级构建工具，支持缓存、多平台等。
      - name: Set up Docker Buildx
        if: needs.notion_precheck.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      # 登录 Docker Hub。
      #
      # 注意：
      #   username 使用你当前 GitHub secret 里的 DOCKER_USERNAME；
      #   token 使用 DOCKERHUB_TOKEN。
      #
      # 只有 should_build=true 时才登录，tag 已存在时不登录。
      - name: Login to Docker Hub
        if: needs.notion_precheck.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 构建并推送 Docker 镜像。
      #
      # tags 完全来自 Notion precheck：
      #   needs.notion_precheck.outputs.full_image
      #
      # 例如：
      #   adlumen/pepclaw-env:0.1.0
      #
      # 这里是实际上传 Docker Hub 的关键步骤。
      - name: Build and push Docker image
        id: build
        if: needs.notion_precheck.outputs.should_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ needs.notion_precheck.outputs.full_image }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.notion_precheck.outputs.version }}
            org.opencontainers.image.title=Fudan-BioForge Docker environment image
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 构建成功后，尝试从刚推送的镜像里收集 pip freeze。
      #
      # 目的：
      #   记录这个环境镜像最终实际安装了哪些 Python 包版本。
      #
      # continue-on-error: true：
      #   pip freeze 收集失败不应该让 Docker publish 本身失败。
      - name: Collect resolved Python packages from pushed image
        if: needs.notion_precheck.outputs.should_build == 'true' && steps.build.outcome == 'success'
        continue-on-error: true
        env:
          FULL_IMAGE: ${{ needs.notion_precheck.outputs.full_image }}
        run: |
          mkdir -p .docker_review
          docker pull "$FULL_IMAGE"
          docker run --rm "$FULL_IMAGE" python -m pip freeze > .docker_review/pip-freeze.txt || true

      # 构建成功后，写 build_result.json。
      #
      # 这个文件会被 notion_writeback 读取，然后写回 Notion。
      # 里面包括：
      #   pushed=true
      #   image/tag/full_image
      #   digest
      #   docker_config_hash
      #   pip_freeze
      #   GitHub run 信息
      - name: Write successful Docker build result
        id: write_success_result
        if: needs.notion_precheck.outputs.should_build == 'true' && steps.build.outcome == 'success'
        env:
          VERSION: ${{ needs.notion_precheck.outputs.version }}
          IMAGE: ${{ needs.notion_precheck.outputs.image }}
          TAG: ${{ needs.notion_precheck.outputs.tag }}
          FULL_IMAGE: ${{ needs.notion_precheck.outputs.full_image }}
          DIGEST: ${{ steps.build.outputs.digest }}
          DOCKER_CONFIG_HASH: ${{ needs.notion_precheck.outputs.docker_config_hash }}
        run: |
          mkdir -p .docker_review
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          pip_freeze_path = Path(".docker_review/pip-freeze.txt")
          pip_freeze = pip_freeze_path.read_text(encoding="utf-8", errors="replace") if pip_freeze_path.exists() else ""

          result = {
              "pushed": True,
              "skipped": False,
              "build_failed": False,
              "reason": "Docker image was built and pushed successfully.",
              "version": os.environ["VERSION"],
              "image": os.environ["IMAGE"],
              "tag": os.environ["TAG"],
              "full_image": os.environ["FULL_IMAGE"],
              "digest": os.environ.get("DIGEST", ""),
              "docker_config_hash": os.environ["DOCKER_CONFIG_HASH"],
              "pip_freeze": pip_freeze,
              "sha": os.environ.get("GITHUB_SHA", ""),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_number": os.environ.get("GITHUB_RUN_NUMBER", ""),
              "run_url": f"{os.environ.get('GITHUB_SERVER_URL', 'https://github.com')}/{os.environ.get('GITHUB_REPOSITORY', '')}/actions/runs/{os.environ.get('GITHUB_RUN_ID', '')}",
          }

          Path(".docker_review/build_result.json").write_text(
              json.dumps(result, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          PY

          echo "pushed=true" >> "$GITHUB_OUTPUT"

      # 如果 Docker build 或 push 失败，写失败版 build_result.json。
      #
      # 注意：
      #   这一步只负责留下结构化失败结果，方便后续 Notion writeback。
      #   具体失败原因仍然要看 GitHub Actions build log。
      - name: Write failed Docker build result
        if: failure() && needs.notion_precheck.outputs.should_build == 'true'
        env:
          VERSION: ${{ needs.notion_precheck.outputs.version }}
          IMAGE: ${{ needs.notion_precheck.outputs.image }}
          TAG: ${{ needs.notion_precheck.outputs.tag }}
          FULL_IMAGE: ${{ needs.notion_precheck.outputs.full_image }}
          DOCKER_CONFIG_HASH: ${{ needs.notion_precheck.outputs.docker_config_hash }}
        run: |
          mkdir -p .docker_review
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          result = {
              "pushed": False,
              "skipped": False,
              "build_failed": True,
              "reason": "Docker build or push failed. Check GitHub Actions logs for details.",
              "version": os.environ["VERSION"],
              "image": os.environ["IMAGE"],
              "tag": os.environ["TAG"],
              "full_image": os.environ["FULL_IMAGE"],
              "digest": "",
              "docker_config_hash": os.environ["DOCKER_CONFIG_HASH"],
              "error": "Docker build or push failed. See workflow logs.",
              "sha": os.environ.get("GITHUB_SHA", ""),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_number": os.environ.get("GITHUB_RUN_NUMBER", ""),
              "run_url": f"{os.environ.get('GITHUB_SERVER_URL', 'https://github.com')}/{os.environ.get('GITHUB_REPOSITORY', '')}/actions/runs/{os.environ.get('GITHUB_RUN_ID', '')}",
          }

          Path(".docker_review/build_result.json").write_text(
              json.dumps(result, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          PY

      # ======================================================================
      # End of MS-owned block
      # ======================================================================

      # 上传 Docker build 结果。
      #
      # 成功、跳过、失败都会尽量上传 .docker_review/。
      # Notion writeback job 会下载这里的 artifact。
      - name: Upload Docker build result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-result-${{ github.run_number }}-${{ github.run_attempt }}
          path: .docker_review/

  # ============================================================
  # Job 3: Notion writeback
  #
  # 作用：
  #   1. 下载 precheck 和 build/push 的结果；
  #   2. 找到 Notion 中对应版本块；
  #   3. 更新状态，例如 pushed / skipped_exists / precheck_failed；
  #   4. 更新 JSON contract 里的 status；
  #   5. 追加 GitHub Action 反馈日志。
  #
  # 设计原则：
  #   无论前面是成功、跳过还是失败，都尽量写回 Notion。
  # ============================================================
  notion_writeback:
    name: Write Docker result back to Notion
    runs-on: ubuntu-latest
    needs:
      - notion_precheck
      - docker_build_push

    # always() 表示即使前面 job 失败，也尝试写回 Notion。
    # 同时仍然限制为同仓库 PR，避免 fork PR 访问 secrets。
    if: >
      always() &&
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      # 拉取仓库代码，主要是为了拿到 scripts/docker_notion_writeback.py。
      - name: Checkout repository
        uses: actions/checkout@v4

      # 下载 precheck artifact。
      # 这里通常会包含 precheck.json / comment.md / docker.env。
      - name: Download Docker precheck artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-precheck-artifacts-${{ github.run_number }}-${{ github.run_attempt }}
          path: .docker_review/

      # 下载 build result artifact。
      #
      # 如果 precheck 阶段直接失败，docker_build_push 可能没有生成这个 artifact。
      # 所以这里 continue-on-error: true。
      - name: Download Docker build result if available
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: docker-build-result-${{ github.run_number }}-${{ github.run_attempt }}
          path: .docker_review/

      # 设置 Python 环境，用于运行 docker_notion_writeback.py。
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 安装 writeback 脚本依赖。
      - name: Install Notion writeback dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 执行 Notion 写回。
      #
      # 脚本会：
      #   - 读取 .docker_review/precheck.json
      #   - 如果存在，读取 .docker_review/build_result.json
      #   - 找到对应版本块
      #   - 更新 状态：xxx
      #   - 更新 JSON contract 里的 status
      #   - 追加 GitHub Action 反馈日志
      - name: Append Docker result to Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DOCKER_PAGE_ID: ${{ secrets.NOTION_DOCKER_PAGE_ID }}
          NOTION_VERSION: "2022-06-28"
        run: |
          python scripts/docker_notion_writeback.py
          
      # 上传 writeback 后的完整产物，方便排查。
      #
      # 通常包括：
      #   precheck.json
      #   build_result.json
      #   writeback.json
      #   comment.md
      #   docker.env
      - name: Upload Notion writeback artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-writeback-artifacts-${{ github.run_number }}-${{ github.run_attempt }}
          path: .docker_review/
