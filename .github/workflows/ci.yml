name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: Structural review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install review tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff pyyaml

      - name: Run Ruff check
        run: |
          mkdir -p .review
          ruff check . --output-format=json > .review/ruff.json || true

      - name: Run Ruff format check
        run: |
          mkdir -p .review
          set +e
          ruff format --check . > .review/ruff-format.txt 2>&1
          echo "$?" > .review/ruff-format.exitcode
          exit 0

      - name: Render review comment
        id: render_review
        run: |
          python scripts/render_review_comment.py

      - name: Upsert PR review summary comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require("fs");

            const marker = "<!-- bioforge-structural-review -->";
            const commentPath = ".review/comment.md";
            const body = fs.readFileSync(commentPath, "utf8");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => {
              return comment.body && comment.body.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-artifacts-${{ github.run_number }}-${{ github.run_attempt }}
          path: .review/
