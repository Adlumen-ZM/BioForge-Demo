name: reviewdog

on:
  pull_request:

jobs:
  reviewdog:
    name: Run reviewdog for Python linters
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install flake8 ruff

      - name: Set up reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Debug versions
        run: |
          python --version
          flake8 --version
          ruff --version
          reviewdog -version

      - name: Run flake8 with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          flake8 . --format='%(path)s:%(row)d:%(col)d: %(code)s %(text)s' \
            | reviewdog \
                -efm="%f:%l:%c: %m" \
                -name="flake8" \
                -reporter=github-pr-review \
                -filter-mode=diff_context \
                || true

      - name: Run ruff with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ruff check . --output-format=pylint \
            | reviewdog \
                -efm="%f:%l:%c: %m" \
                -name="ruff" \
                -reporter=github-pr-review \
                -filter-mode=diff_context \
                || true
