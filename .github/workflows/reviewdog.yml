name: reviewdog

on:
  pull_request:

jobs:
  reviewdog:
    name: Run reviewdog for Python linters
    runs-on: ubuntu-latest

    # reviewdog 往 PR 写评论，需要 pull-requests: write
    permissions:
      contents: read
      pull-requests: write

    steps:
      # 1. 拉代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. 安装依赖
      # 这里只装你当前用到的 flake8 和 ruff
      # 未来如果你要加 mypy / black / pytest 等，就在这里继续加
      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install flake8 ruff

      # 4. 安装 reviewdog
      # action-setup 的作用只是安装 reviewdog 可执行文件
      - name: Set up reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      # 5. 可选调试信息
      # 初期建议保留，确认 GitHub 跑到的就是你想要的版本
      # 稳定后可以删掉
      - name: Debug versions
        run: |
          python --version
          flake8 --version
          ruff --version
          reviewdog -version

      # 6. 运行 flake8 并把结果交给 reviewdog
      #
      # 说明：
      # - flake8 默认格式就是 path:line:col: message
      # - 这里显式指定 --format，是为了避免以后环境变化
      # - -efm 是 reviewdog 的 errorformat，用来解析 flake8 输出
      # - github-pr-review 表示直接在 PR diff 上发 review comment
      # - diff_context 表示只评论和改动有关的内容，避免刷屏
      # - continue-on-error: true 表示即便发现 lint 问题，也不中断整个 job
      #
      # 如果你未来想让有 lint 问题时 CI 直接红掉：
      # 1) 去掉 continue-on-error: true
      # 2) 再给 reviewdog 增加 -fail-on-error
      - name: Run flake8 with reviewdog
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          flake8 . --format='%(path)s:%(row)d:%(col)d: %(code)s %(text)s' \
            | reviewdog \
                -efm="%f:%l:%c: %m" \
                -name="flake8" \
                -reporter=github-pr-review \
                -filter-mode=diff_context

      # 7. 运行 ruff 并把结果交给 reviewdog
      #
      # 这里我故意不用“依赖 .reviewdog.yml 才能工作”的写法，
      # 而是直接在命令里把格式讲清楚，减少排错难度。
      #
      # ruff 的 --output-format=pylint 形如：
      # path:line:col: message
      # 所以仍然可以用相同的 -efm 解析
      #
      # 如果你以后换成别的输出格式，这里也要跟着改
      - name: Run ruff with reviewdog
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ruff check . --output-format=pylint \
            | reviewdog \
                -efm="%f:%l:%c: %m" \
                -name="ruff" \
                -reporter=github-pr-review \
                -filter-mode=diff_context
